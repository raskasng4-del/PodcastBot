name: Podcast Bot Automation

on:
  schedule:
    - cron: '0 */12 * * *'
  workflow_dispatch:
    inputs:
      test_url:
        description: '🔗 حط رابط فيديو يوتيوب هنا للتجربة'
        required: false
        type: string

jobs:
  process:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg imagemagick nodejs

      - name: Install Python Dependencies
        run: |
          pip install -r requirements.txt

      - name: Run Podcast Bot
        env:
          FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
          FB_ACCESS_TOKEN: ${{ secrets.FB_ACCESS_TOKEN }}
          YOUTUBE_CHANNEL: ${{ secrets.YOUTUBE_CHANNEL }}
          TEST_URL: ${{ github.event.inputs.test_url }}
        run: |
          # هادي أحسن طريقة باش السطورة ديال الكوكيز يبقاو مقادين بلا ما يتخربقو
          cat << 'EOF' > cookies.txt
          ${{ secrets.YOUTUBE_COOKIES }}
          EOF
          
          if [ -n "$TEST_URL" ]; then
            echo "🚀 غادي نجربو هاد الفيديو بالضبط: $TEST_URL"
            python podcast_bot.py --cookies cookies.txt --url "$TEST_URL"
          else
            echo "🔍 غادي نقلبو القناة كاملة..."
            python podcast_bot.py --cookies cookies.txt
          fi
