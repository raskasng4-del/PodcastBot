name: 🤖 Podcast Bot

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

env:
  YOUTUBE_CHANNEL: "https://www.youtube.com/@samir-lail.mestapha-lherda/videos"

jobs:
  process:
    runs-on: ubuntu-latest
    timeout-minutes: 300

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN || secrets.GITHUB_TOKEN }}

      - name: 📦 تثبيت
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg imagemagick fonts-noto fonts-hosny-amiri
          sudo fc-cache -f
          if [ -f /etc/ImageMagick-6/policy.xml ]; then
            sudo sed -i 's|<policy domain="path" rights="none" pattern="@\*"/>|<policy domain="path" rights="read\|write" pattern="@*"/>|' /etc/ImageMagick-6/policy.xml
          fi
          pip install -q -r requirements.txt

      - name: 🤖 تشغيل البوت - مراقبة يوتيوب ونشر للفيسبوك
        env:
          FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
          FB_ACCESS_TOKEN: ${{ secrets.FB_ACCESS_TOKEN }}
          YOUTUBE_COOKIES: ${{ secrets.YOUTUBE_COOKIES }}
        run: |
          if [ -n "$YOUTUBE_COOKIES" ]; then
            echo "$YOUTUBE_COOKIES" | base64 -d > youtube_cookies.txt
            COOKIES_ARG="--cookies youtube_cookies.txt"
          else
            COOKIES_ARG=""
          fi
          python podcast_bot.py \
            --page-id "$FB_PAGE_ID" \
            --token "$FB_ACCESS_TOKEN" \
            --youtube-channel "$YOUTUBE_CHANNEL" \
            --bg abdo.png \
            --output output \
            --part-duration 1800 \
            $COOKIES_ARG

      - name: 💾 حفظ الحالة (processed.txt) في المستودع
        run: |
          git config user.name "Podcast Bot"
          git config user.email "bot@podcast.com"
          if [ -f processed.txt ] && [ -s processed.txt ]; then
            git add processed.txt
            git diff --staged --quiet || git commit -m "🤖 تحديث processed.txt $(date +%Y-%m-%d)"
            git remote set-url origin https://x-access-token:${{ secrets.GH_TOKEN || secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}
            git push
          fi

      - name: 📥 رفع الفيديوات كـ Artifact
        uses: actions/upload-artifact@v4
        with:
          name: podcast-video
          path: output/
          if-no-files-found: warn
