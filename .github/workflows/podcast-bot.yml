name: Podcast Bot Automation

on:
  schedule:
    - cron: '0 */12 * * *'
  workflow_dispatch:
    inputs:
      test_url:
        description: '🔗 رابط يوتيوب للتجربة'
        required: false
        type: string
      test_title:
        description: '📝 اسم البودكاست'
        required: false
        default: 'بودكاست عبدو سمير'
        type: string

jobs:
  process:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg imagemagick fonts-noto-core

      - name: Install Python Dependencies
        run: pip install -r requirements.txt

      - name: Generate PO Token
        id: potoken
        run: |
          pip install yt-dlp-pot-provider 2>/dev/null || true
          # نجربو نولدو PO Token تلقائياً
          python3 -c "
          import subprocess, json, sys
          try:
              result = subprocess.run(
                  ['python3', '-m', 'yt_dlp_pot_provider'],
                  capture_output=True, text=True, timeout=30
              )
              print(result.stdout)
          except Exception as e:
              print(f'PO Token generation skipped: {e}', file=sys.stderr)
          " || echo "PO Token not available"

      - name: Run Podcast Bot
        env:
          GROQ_API_KEY:    ${{ secrets.GROQ_API_KEY }}
          FB_PAGE_ID:      ${{ secrets.FB_PAGE_ID }}
          FB_ACCESS_TOKEN: ${{ secrets.FB_ACCESS_TOKEN }}
          YOUTUBE_CHANNEL: ${{ secrets.YOUTUBE_CHANNEL }}
          PO_TOKEN:        ${{ secrets.PO_TOKEN }}
        run: |
          if [ -n "${{ github.event.inputs.test_url }}" ]; then
            echo "🚀 وضع التجربة: ${{ github.event.inputs.test_url }}"
            python podcast_bot.py \
              --url "${{ github.event.inputs.test_url }}" \
              --title "${{ github.event.inputs.test_title }}"
          else
            echo "🔍 وضع تلقائي"
            python podcast_bot.py
          fi
